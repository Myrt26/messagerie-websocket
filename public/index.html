<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messagerie en temps réel</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .messages-container {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            height: 400px;
            overflow-y: auto;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px 15px;
            border-radius: 15px;
            max-width: 80%;
            animation: fadeIn 0.3s;
        }
        .message.own {
            background-color: #007bff;
            color: white;
            margin-left: auto;
        }
        .message.other {
            background-color: #e9ecef;
            color: #333;
            margin-right: auto;
        }
        .message.system {
            background-color: #f8d7da;
            color: #721c24;
            text-align: center;
            margin: 10px auto;
            max-width: 80%;
        }
        .message .timestamp {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-left: 8px;
        }
        .message .sender {
            font-weight: bold;
            font-size: 0.8rem;
            display: block;
            margin-bottom: 2px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #connectionStatus .fa-circle {
            font-size: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">
                            <i class="fas fa-comments"></i> 
                            Messagerie en temps réel
                            <span class="badge bg-light text-dark float-end" id="connectionStatus">
                                <i class="fas fa-circle text-success"></i> Connecté
                            </span>
                        </h4>
                    </div>
                    <div class="card-body">
                        <!-- Zone des messages -->
                        <div id="messages" class="messages-container">
                            <div class="text-center text-muted p-3">
                                <i class="fas fa-info-circle"></i> Bienvenue dans la messagerie
                            </div>
                        </div>
                        
                        <!-- Zone de saisie -->
                        <div class="input-group mt-3">
                            <input type="text" 
                                   id="messageInput" 
                                   class="form-control" 
                                   placeholder="Écrivez votre message..."
                                   aria-label="Message">
                            <button class="btn btn-primary" id="sendButton" type="button">
                                <i class="fas fa-paper-plane"></i> Envoyer
                            </button>
                        </div>
                        
                        <div class="mt-2 text-muted small">
                            <i class="fas fa-user"></i> Votre ID: <span id="clientId">En attente...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ====== CODE JAVASCRIPT PRINCIPAL ======
        let ws = null;
        let clientId = null;
        let isConnected = false;

        // Récupérer les éléments HTML
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const clientIdDisplay = document.getElementById('clientId');
        const connectionStatus = document.getElementById('connectionStatus');

        // Fonction pour se connecter
        function connectWebSocket() {
            // Pour le test local
            let wsUrl = 'ws://localhost:3000';
            
            // Pour Render (décommenter quand déployé)
            // wsUrl = 'wss://ton-app-sur-render.onrender.com';
            
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    isConnected = true;
                    updateConnectionStatus(true);
                    addSystemMessage('✅ Connecté au serveur');
                };
                
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        handleMessage(data);
                    } catch (error) {
                        console.error('Erreur:', error);
                    }
                };
                
                ws.onclose = () => {
                    isConnected = false;
                    updateConnectionStatus(false);
                    addSystemMessage('❌ Déconnecté - Reconnexion dans 3s...');
                    
                    // Reconnexion automatique
                    setTimeout(() => {
                        connectWebSocket();
                    }, 3000);
                };
                
                ws.onerror = (error) => {
                    console.error('Erreur WebSocket:', error);
                };
                
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        // Gérer les messages reçus
        function handleMessage(data) {
            if (data.type === 'init') {
                clientId = data.clientId;
                clientIdDisplay.textContent = clientId;
                addSystemMessage(data.message);
                return;
            }
            
            if (data.type === 'disconnect') {
                addSystemMessage(data.message);
                return;
            }
            
            // Message normal
            addMessage(data);
        }

        // Envoyer un message
        function sendMessage() {
            const text = messageInput.value.trim();
            
            if (!text) {
                messageInput.focus();
                return;
            }
            
            if (!isConnected) {
                addSystemMessage('⚠️ Vous n\'êtes pas connecté');
                return;
            }
            
            try {
                ws.send(JSON.stringify({ text: text }));
                messageInput.value = '';
                messageInput.focus();
            } catch (error) {
                console.error('Erreur:', error);
                addSystemMessage('❌ Erreur d\'envoi');
            }
        }

        // Afficher un message
        function addMessage(data) {
            const isOwn = data.clientId === clientId;
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isOwn ? 'own' : 'other'}`;
            
            if (!isOwn) {
                const senderSpan = document.createElement('span');
                senderSpan.className = 'sender';
                senderSpan.textContent = `Client ${data.clientId}`;
                messageDiv.appendChild(senderSpan);
            }
            
            const textSpan = document.createElement('span');
            textSpan.textContent = data.text;
            messageDiv.appendChild(textSpan);
            
            const timestampSpan = document.createElement('span');
            timestampSpan.className = 'timestamp';
            const time = new Date(data.timestamp);
            timestampSpan.textContent = time.toLocaleTimeString();
            messageDiv.appendChild(timestampSpan);
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Afficher un message système
        function addSystemMessage(message) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message system';
            messageDiv.textContent = message;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Mettre à jour le statut de connexion
        function updateConnectionStatus(connected) {
            if (connected) {
                connectionStatus.innerHTML = '<i class="fas fa-circle text-success"></i> Connecté';
            } else {
                connectionStatus.innerHTML = '<i class="fas fa-circle text-danger"></i> Déconnecté';
            }
        }

        // Événements
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Démarrer la connexion
        connectWebSocket();
    </script>
</body>
</html>
